            <button onclick="sepetiTemizle()" style="padding: 15px 30px; background: #fff; color: #cc0000; border: 2px solid #cc0000; font-weight: 800; cursor: pointer; border-radius: 4px; transition: 0.3s;" onmouseover="this.style.background='#cc0000'; this.style.color='#fff'" onmouseout="this.style.background='#fff'; this.style.color='#cc0000'">Sepeti Boşalt</button>
            <button onclick="sepetiOnayla()" style="padding: 15px 40px; background: #0033a0; color: white; border: none; font-weight: 800; cursor: pointer; border-radius: 4px; transition: 0.3s; font-size: 16px;" onmouseover="this.style.background='#001f66'" onmouseout="this.style.background='#0033a0'">Güvenli Ödeme Adımına Geç &rarr;</button>
